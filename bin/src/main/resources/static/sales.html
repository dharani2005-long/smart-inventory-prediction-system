<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sales · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="si-content">
    <div class="si-topbar">
        <h3 class="mb-0">Sales</h3>
        <span class="badge text-bg-secondary" id="userBadge"></span>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-lg-4">
            <div class="card shadow-sm"><div class="card-body">
                <h6 class="card-title">Record Sale</h6>
                <form id="saleForm">
                    <div class="mb-2"><label class="form-label">Product *</label><select class="form-select" id="sProduct" required></select></div>
                    <div class="mb-2"><label class="form-label">Quantity *</label><input type="number" min="1" class="form-control" id="sQty" required></div>
                    <div class="mb-2"><label class="form-label">Date</label><input type="date" class="form-control" id="sDate"></div>
                    <div class="mb-3"><label class="form-label">Invoice No.</label><input class="form-control" id="sInvoice"></div>
                    <button class="btn btn-primary w-100">Record Sale</button>
                </form>
            </div></div>
        </div>
        <div class="col-lg-8">
            <div class="card shadow-sm"><div class="card-body">
                <h6 class="card-title">Recent Sales</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-hover align-middle">
                        <thead><tr><th>Date</th><th>Product</th><th class="text-end">Qty</th><th class="text-end">Total</th><th>Invoice</th></tr></thead>
                        <tbody id="salesTable"></tbody>
                    </table>
                </div>
            </div></div>
        </div>
    </div>

    <div class="card shadow-sm"><div class="card-body">
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dailyTab" onclick="loadDaily()">Daily</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#monthlyTab" onclick="loadMonthly()">Monthly</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#productTab" onclick="loadProductWise()">Product-wise</button></li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="dailyTab"><canvas id="dailyChart" height="80"></canvas><div id="dailyTable" class="mt-3"></div></div>
            <div class="tab-pane fade" id="monthlyTab"><canvas id="monthlyChart" height="80"></canvas><div id="monthlyTable" class="mt-3"></div></div>
            <div class="tab-pane fade" id="productTab"><div id="productTable"></div></div>
        </div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/sales.js"></script>
</body>
</html>
