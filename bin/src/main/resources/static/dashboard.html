<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="si-content">
    <div class="si-topbar">
        <h3 class="mb-0">Dashboard</h3>
        <span class="badge text-bg-secondary" id="userBadge"></span>
    </div>

    <div class="row g-3 mb-4" id="kpiRow"></div>

    <div class="row g-3 mb-4">
        <div class="col-lg-7">
            <div class="card shadow-sm"><div class="card-body">
                <h6 class="card-title">Sales Trend (last 14 days)</h6>
                <canvas id="trendChart" height="120"></canvas>
            </div></div>
        </div>
        <div class="col-lg-5">
            <div class="card shadow-sm"><div class="card-body">
                <h6 class="card-title">Top Products (this month)</h6>
                <canvas id="topChart" height="120"></canvas>
            </div></div>
        </div>
    </div>

    <div class="card shadow-sm"><div class="card-body">
        <h6 class="card-title"><i class="bi bi-graph-up-arrow me-1"></i>Prediction Summary</h6>
        <div class="row text-center" id="predRow"></div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
