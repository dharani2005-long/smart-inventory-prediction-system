<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="login-wrap">
    <div class="card login-card shadow-lg">
        <div class="card-body p-4">
            <h4 class="text-center mb-1"><i class="bi bi-boxes me-2"></i>Smart Inventory</h4>
            <p class="text-center text-muted small mb-3">Prediction System</p>

            <ul class="nav nav-pills nav-justified mb-3" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#loginTab">Login</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#registerTab">Register</button></li>
            </ul>

            <div class="tab-content">
                <!-- Login -->
                <div class="tab-pane fade show active" id="loginTab">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username or Email</label>
                            <input class="form-control" id="loginUser" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPass" required>
                        </div>
                        <button class="btn btn-primary w-100">Login</button>
                    </form>
                    <div class="alert alert-info small mt-3 mb-0">
                        Demo: <b>admin / password123</b> (also manager, staff)
                    </div>
                </div>

                <!-- Register -->
                <div class="tab-pane fade" id="registerTab">
                    <form id="registerForm">
                        <div class="mb-2"><input class="form-control" id="regUser" placeholder="Username" required></div>
                        <div class="mb-2"><input class="form-control" id="regName" placeholder="Full name" required></div>
                        <div class="mb-2"><input type="email" class="form-control" id="regEmail" placeholder="Email" required></div>
                        <div class="mb-2"><input type="password" class="form-control" id="regPass" placeholder="Password (min 6)" required></div>
                        <div class="mb-3">
                            <select class="form-select" id="regRole">
                                <option value="STAFF">Staff</option>
                                <option value="MANAGER">Manager</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                        <button class="btn btn-success w-100">Create account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
    if (API.isLoggedIn()) location.href = 'dashboard.html';

    function onAuth(resp) {
        API.setToken(resp.accessToken);
        API.setUser({ username: resp.username, fullName: resp.fullName, roles: resp.roles });
        location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            const resp = await API.post('/auth/login', {
                usernameOrEmail: loginUser.value.trim(),
                password: loginPass.value
            }, { auth: false });
            onAuth(resp);
        } catch (err) { UI.toast(err.message, 'error'); }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            const resp = await API.post('/auth/register', {
                username: regUser.value.trim(),
                fullName: regName.value.trim(),
                email: regEmail.value.trim(),
                password: regPass.value,
                roles: [regRole.value]
            }, { auth: false });
            onAuth(resp);
        } catch (err) { UI.toast(err.message, 'error'); }
    });
</script>
</body>
</html>
