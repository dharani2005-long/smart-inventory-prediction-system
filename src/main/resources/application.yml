server:
  port: 8080

spring:
  application:
    name: smart-inventory-prediction-system

  datasource:
    url: xxxxxxxxxxxxxx
    username: xxxxxxxxxxxxx.root
    password: xxxxxxxxxxxxxxx
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # create-drop for fresh start, update for incremental
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # Seed data file runs after Hibernate creates the schema
  sql:
    init:
      mode: never               # set to 'always' to load data.sql; we seed via DataSeeder bean

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT configuration
app:
  jwt:
    # Base64-encoded 256-bit secret. OVERRIDE in production via APP_JWT_SECRET env var.
    secret: ${APP_JWT_SECRET:}
    expiration-ms: ${APP_JWT_EXPIRATION:86400000}        # 24 hours
    refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION:604800000}  # 7 days

# Springdoc / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.smartinventory: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
