<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="si-content">
    <div class="si-topbar">
        <h3 class="mb-0">Products</h3>
        <span class="badge text-bg-secondary" id="userBadge"></span>
    </div>

    <div class="card shadow-sm mb-3"><div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label small">Search (name / SKU / barcode)</label>
                <input class="form-control" id="searchInput" placeholder="Type to search...">
            </div>
            <div class="col-md-3">
                <label class="form-label small">Category</label>
                <select class="form-select" id="categoryFilter"><option value="">All</option></select>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-outline-secondary" onclick="loadProducts(0)"><i class="bi bi-search"></i> Search</button>
                <button class="btn btn-primary" id="addBtn"><i class="bi bi-plus-lg"></i> Add Product</button>
            </div>
        </div>
    </div></div>

    <div class="card shadow-sm"><div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead><tr>
                    <th>SKU</th><th>Name</th><th>Category</th><th>Supplier</th>
                    <th class="text-end">Price</th><th class="text-end">Stock</th><th>Status</th><th></th>
                </tr></thead>
                <tbody id="productTable"></tbody>
            </table>
        </div>
        <nav><ul class="pagination pagination-sm mb-0" id="pager"></ul></nav>
    </div></div>
</div>

<!-- Product modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content"><form id="productForm">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add Product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="productId">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Name *</label><input class="form-control" id="pName" required></div>
                <div class="col-md-3"><label class="form-label">SKU *</label><input class="form-control" id="pSku" required></div>
                <div class="col-md-3"><label class="form-label">Barcode</label><input class="form-control" id="pBarcode"></div>
                <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" id="pDesc" rows="2"></textarea></div>
                <div class="col-md-3"><label class="form-label">Unit Price *</label><input type="number" step="0.01" class="form-control" id="pPrice" required></div>
                <div class="col-md-3"><label class="form-label">Cost Price</label><input type="number" step="0.01" class="form-control" id="pCost"></div>
                <div class="col-md-3"><label class="form-label">Reorder Level *</label><input type="number" class="form-control" id="pReorder" value="10" required></div>
                <div class="col-md-3"><label class="form-label">Opening Stock</label><input type="number" class="form-control" id="pOpening" value="0"></div>
                <div class="col-md-6"><label class="form-label">Category</label><select class="form-select" id="pCategory"><option value="">None</option></select></div>
                <div class="col-md-6"><label class="form-label">Supplier</label><select class="form-select" id="pSupplier"><option value="">None</option></select></div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/products.js"></script>
</body>
</html>
