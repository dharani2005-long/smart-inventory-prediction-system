<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Suppliers · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="si-content">
    <div class="si-topbar">
        <h3 class="mb-0">Suppliers</h3>
        <span class="badge text-bg-secondary" id="userBadge"></span>
    </div>

    <div class="card shadow-sm mb-3"><div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-6"><input class="form-control" id="searchInput" placeholder="Search suppliers..."></div>
            <div class="col-md-6 text-end">
                <button class="btn btn-outline-secondary" onclick="loadSuppliers(0)"><i class="bi bi-search"></i> Search</button>
                <button class="btn btn-primary" id="addBtn"><i class="bi bi-plus-lg"></i> Add Supplier</button>
            </div>
        </div>
    </div></div>

    <div class="card shadow-sm"><div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead><tr><th>Name</th><th>Contact</th><th>Email</th><th>Phone</th><th>Status</th><th></th></tr></thead>
                <tbody id="supplierTable"></tbody>
            </table>
        </div>
        <nav><ul class="pagination pagination-sm mb-0" id="pager"></ul></nav>
    </div></div>
</div>

<!-- Supplier modal -->
<div class="modal fade" id="supplierModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content"><form id="supplierForm">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add Supplier</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" id="supplierId">
            <div class="mb-2"><label class="form-label">Name *</label><input class="form-control" id="sName" required></div>
            <div class="mb-2"><label class="form-label">Contact Person</label><input class="form-control" id="sContact"></div>
            <div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="sEmail"></div>
            <div class="mb-2"><label class="form-label">Phone</label><input class="form-control" id="sPhone"></div>
            <div class="mb-2"><label class="form-label">Address</label><textarea class="form-control" id="sAddress" rows="2"></textarea></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form></div></div>
</div>

<!-- Products modal -->
<div class="modal fade" id="productsModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Linked Products</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><div id="linkedProducts"></div></div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/suppliers.js"></script>
</body>
</html>
