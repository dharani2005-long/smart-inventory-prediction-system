<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Predictions · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="si-content">
    <div class="si-topbar">
        <h3 class="mb-0">Smart Predictions</h3>
        <span class="badge text-bg-secondary" id="userBadge"></span>
    </div>

    <div class="card shadow-sm mb-3"><div class="card-body d-flex justify-content-between align-items-center">
        <div class="form-text mb-0">
            Moving-average forecast over a 30-day lookback, projecting demand for the next 30 days.
        </div>
        <div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="alertsOnly" onchange="render()">
                <label class="form-check-label" for="alertsOnly">Alerts only</label>
            </div>
            <button class="btn btn-primary btn-sm" id="runBtn"><i class="bi bi-arrow-repeat"></i> Run Forecast</button>
        </div>
    </div></div>

    <div class="card shadow-sm"><div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead><tr>
                    <th>Product</th><th class="text-end">Avg/Day</th><th class="text-end">30d Demand</th>
                    <th class="text-end">Stock</th><th>Depletion</th><th class="text-end">Reorder</th>
                    <th>Confidence</th><th>Recommendation</th>
                </tr></thead>
                <tbody id="forecastTable"></tbody>
            </table>
        </div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/predictions.js"></script>
</body>
</html>
