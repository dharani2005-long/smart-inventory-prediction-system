<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reports · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="si-content">
    <div class="si-topbar">
        <h3 class="mb-0">Reports (Excel Export)</h3>
        <span class="badge text-bg-secondary" id="userBadge"></span>
    </div>

    <div class="row g-3">
        <div class="col-md-6 col-lg-3">
            <div class="card shadow-sm h-100 text-center"><div class="card-body">
                <i class="bi bi-box-seam fs-1 text-primary"></i>
                <h6 class="mt-2">Inventory Report</h6>
                <p class="small text-muted">Stock levels & valuation</p>
                <button class="btn btn-outline-primary btn-sm" onclick="dl('/reports/inventory','inventory-report.xlsx')">
                    <i class="bi bi-download"></i> Download</button>
            </div></div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card shadow-sm h-100 text-center"><div class="card-body">
                <i class="bi bi-cart-check fs-1 text-success"></i>
                <h6 class="mt-2">Sales Report</h6>
                <div class="row g-1 my-2">
                    <div class="col"><input type="date" id="salesStart" class="form-control form-control-sm"></div>
                    <div class="col"><input type="date" id="salesEnd" class="form-control form-control-sm"></div>
                </div>
                <button class="btn btn-outline-success btn-sm" onclick="downloadSales()">
                    <i class="bi bi-download"></i> Download</button>
            </div></div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card shadow-sm h-100 text-center"><div class="card-body">
                <i class="bi bi-truck fs-1 text-info"></i>
                <h6 class="mt-2">Supplier Report</h6>
                <p class="small text-muted">Suppliers & linked products</p>
                <button class="btn btn-outline-info btn-sm" onclick="dl('/reports/suppliers','supplier-report.xlsx')">
                    <i class="bi bi-download"></i> Download</button>
            </div></div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card shadow-sm h-100 text-center"><div class="card-body">
                <i class="bi bi-graph-up-arrow fs-1 text-warning"></i>
                <h6 class="mt-2">Forecast Report</h6>
                <p class="small text-muted">Demand & reorder forecast</p>
                <button class="btn btn-outline-warning btn-sm" onclick="dl('/reports/forecast','forecast-report.xlsx')">
                    <i class="bi bi-download"></i> Download</button>
            </div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
