<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stock · Smart Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="si-content">
    <div class="si-topbar">
        <h3 class="mb-0">Stock Transactions</h3>
        <span class="badge text-bg-secondary" id="userBadge"></span>
    </div>

    <div class="row g-3">
        <div class="col-lg-4">
            <div class="card shadow-sm"><div class="card-body">
                <h6 class="card-title">Record Movement</h6>
                <form id="stockForm">
                    <div class="mb-2"><label class="form-label">Product *</label>
                        <select class="form-select" id="tProduct" required></select></div>
                    <div class="mb-2"><label class="form-label">Type *</label>
                        <select class="form-select" id="tType" required>
                            <option value="STOCK_IN">Stock In (+)</option>
                            <option value="STOCK_OUT">Stock Out (−)</option>
                            <option value="RETURN">Return (+)</option>
                            <option value="ADJUSTMENT">Adjustment (±)</option>
                        </select></div>
                    <div class="mb-2"><label class="form-label">Quantity *</label>
                        <input type="number" class="form-control" id="tQty" required>
                        <div class="form-text">For Adjustment, use a signed value (e.g. -5).</div></div>
                    <div class="mb-2"><label class="form-label">Reference No.</label><input class="form-control" id="tRef"></div>
                    <div class="mb-3"><label class="form-label">Note</label><input class="form-control" id="tNote"></div>
                    <button class="btn btn-primary w-100">Record</button>
                </form>
            </div></div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm"><div class="card-body">
                <h6 class="card-title">Recent Transactions</h6>
                <div class="table-responsive">
                    <table class="table table-sm table-hover align-middle">
                        <thead><tr><th>Date</th><th>Product</th><th>Type</th><th class="text-end">Qty</th><th class="text-end">Balance</th><th>By</th></tr></thead>
                        <tbody id="txnTable"></tbody>
                    </table>
                </div>
                <nav><ul class="pagination pagination-sm mb-0" id="pager"></ul></nav>
            </div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/stock.js"></script>
</body>
</html>
